name: Publish

# Публикация @labpics/icons в GitHub Packages (npm-регистри npm.pkg.github.com).
#
# КОГДА срабатывает:
#   • release: published — публикуем ТОЛЬКО когда в репозитории опубликован Release
#     (тег + заметки). Черновик релиза не триггерит — нужен именно "published".
#     Версия берётся из package.json (сейчас 0.0.1); для следующего релиза версию
#     обязательно поднять — GitHub Packages, как и npm, отклоняет повторную
#     публикацию уже существующей версии.
#   • workflow_dispatch — ручной запуск из вкладки Actions (страховка/переиздание
#     после почин­ки, без создания нового Release).
on:
  release:
    types: [published]
  workflow_dispatch:

# Least privilege: воркфлоу нужно лишь читать код и писать пакеты.
#   packages: write — даёт автоматическому GITHUB_TOKEN право публиковать npm-пакет
#   в GitHub Packages ЭТОГО репозитория/организации. Отдельный PAT НЕ нужен и
#   запрещён (секрет в файлах = утечка): встроенный GITHUB_TOKEN самодостаточен
#   для публикации пакета, привязанного к своему репозиторию.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Verify gate + publish to GitHub Packages
    runs-on: [self-hosted, Linux, X64]

    steps:
      # Actions запинены по SHA (supply-chain) — ТЕ ЖЕ пины, что в ci.yml.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Публикация не пушит в git — git-креды в рабочем дереве не нужны.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9
          # per-job dest: дефолтный ~/setup-pnpm ОБЩИЙ для 8 self-hosted раннеров
          # (один /home/daniel) и гоняется между конкурентными job'ами любых репо.
          dest: ${{ runner.temp }}/setup-pnpm

      # registry-url + scope заставляют setup-node сгенерировать .npmrc, в котором:
      #   @labpics:registry=https://npm.pkg.github.com/  — куда идёт scoped-пакет,
      #   //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN} — как аутентифицироваться.
      # Без этого шага pnpm publish не знал бы ни регистри, ни токена. Значение
      # NODE_AUTH_TOKEN задаётся ниже, на самом шаге публикации.
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@labpics'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Полный гейт перед публикацией: build + parity(444) + colours + tree-shaking.
      # Не публикуем артефакт, не прошедший все инварианты репозитория. verify также
      # собирает dist/ (он gitignored) — именно его и пакует publish по полю "files".
      - name: Verify (build + parity + colours + tree-shaking)
        run: pnpm verify

      # --no-git-checks: pnpm publish по умолчанию требует чистое дерево и публикацию
      # с ветки по умолчанию. Здесь дерево заведомо "грязное" (свежесобранный dist/
      # не в git), а публикуем по тегу релиза — поэтому git-проверки отключаем.
      # NODE_AUTH_TOKEN = встроенный GITHUB_TOKEN (см. permissions.packages: write).
      # Как это ставить потребителю — раздел "Установка" в README.md.
      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
