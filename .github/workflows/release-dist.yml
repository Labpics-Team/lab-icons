name: Release dist tag

# Публикует иммутабельный git-dependency артефакт поверх релизного тега.
# Канал npm проверяется и документируется отдельно; этот workflow отвечает
# только за братский <tag>-dist и не должен менять master.
on:
  push:
    tags:
      - 'v*'
      # Push собственного -dist тега не должен зациклить workflow.
      - '!v*-dist'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Релизный тег vX.Y.Z для ручной пересборки dist'
        required: true

# Единственное необходимое расширенное право — push братского тега.
permissions:
  contents: write

jobs:
  release-dist:
    name: Verify gate + push <tag>-dist
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      # Те же SHA-пины, что в ci.yml. persist-credentials здесь нужен для push.
      - name: Checkout release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          # Differential-гейты обязаны читать последний ручной blob, а не
          # текущий generated SVG релизного тега.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          # Должно совпадать с package.json#packageManager; это держит
          # scripts/check-repo-contract.js внутри pnpm verify.
          version: 10.30.3
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Единственный канонический список сборки, геометрических гейтов и тестов.
      - name: Verify release source
        run: pnpm verify

      - name: Build and push <tag>-dist
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          case "$TAG" in
            *-dist)
              echo "::error::Ожидался релизный тег vX.Y.Z, а не -dist ($TAG)"
              exit 1
              ;;
          esac
          DIST_TAG="${TAG}-dist"

          if git ls-remote --exit-code --tags origin "refs/tags/${DIST_TAG}" >/dev/null 2>&1; then
            echo "Тег ${DIST_TAG} уже существует — иммутабельный артефакт не перезаписывается."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # dist/ gitignored. Принудительно добавляем ровно опубликованные входы
          # из package.json#files, включая ESM/CJS/types подпути ./animate.
          git add -f dist/index.js dist/index.d.ts dist/animate
          git commit -m "build: dist для ${DIST_TAG} (git-dep артефакт; master не трогаем)"
          git tag "${DIST_TAG}"
          git push origin "refs/tags/${DIST_TAG}"
          echo "Опубликован git-dep тег ${DIST_TAG}."
