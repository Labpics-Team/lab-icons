name: Release dist tag

# Публикует иммутабельный git-dependency артефакт поверх релизного тега.
# Канал npm проверяется и документируется отдельно; этот workflow отвечает
# только за братский <tag>-dist и не должен менять master.
on:
  push:
    tags:
      - 'v*'
      # Push собственного -dist тега не должен зациклить workflow.
      - '!v*-dist'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Существующий source tag v<package.json#version>; branch/SHA запрещены'
        required: true

# Единственное необходимое расширенное право — push братского тега.
permissions:
  contents: write

jobs:
  release-dist:
    name: Verify gate + push <tag>-dist
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      # Те же SHA-пины, что в ci.yml. persist-credentials здесь нужен для push.
      - name: Checkout release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Verify включает historical-hand provenance и не работает shallow.
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          # Должно совпадать с package.json#packageManager; это держит
          # scripts/check-repo-contract.js внутри pnpm verify.
          version: 10.30.3
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate exact source release ref
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: node scripts/check-release-ref.js source "$RELEASE_TAG"

      # Единственный канонический список сборки, геометрических гейтов и тестов.
      - name: Verify release source
        run: pnpm verify

      - name: Build and push <tag>-dist
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          DIST_TAG="${TAG}-dist"

          if git ls-remote --exit-code --tags origin "refs/tags/${DIST_TAG}" >/dev/null 2>&1; then
            git fetch --no-tags origin "refs/tags/${DIST_TAG}:refs/tags/${DIST_TAG}"
            node scripts/check-release-ref.js dist "$TAG"
            echo "Тег ${DIST_TAG} уже существует и байт-в-байт соответствует source ${TAG}; не перезаписываем."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Скрипт читает единственный manifest release/contract.json, удаляет
          # stale tracked dist из index и добавляет только точные файлы канона.
          node scripts/stage-release-dist.js
          git commit -m "build: dist для ${DIST_TAG} (git-dep артефакт; master не трогаем)"
          git tag "${DIST_TAG}"
          node scripts/check-release-ref.js dist "$TAG"
          git push origin "refs/tags/${DIST_TAG}"
          echo "Опубликован git-dep тег ${DIST_TAG}."
