name: Nightly quality

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      strict:
        description: 'Run strict overnight checks (exit 1 on hard defects)'
        required: false
        default: 'false'
        type: boolean

jobs:
  quality:
    name: Visual quality + topology gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run visual/nightly gates
        run: pnpm check:quality-nightly -- --report

      - name: Run strict gates (manual only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.strict }}
        continue-on-error: true
        run: pnpm check:quality-nightly:strict -- --report

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-quality-report
          path: quality/
