name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Canonical pnpm verify (Linux)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      # Actions запинены по SHA: supply-chain обновляется отдельным ревью.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Observatory сравнивает generated с доказанным hand blob из history.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          # Должно дословно совпадать с package.json#packageManager;
          # scripts/check-repo-contract.js не даст этим источникам разойтись.
          version: 10.30.3
          # Общий $HOME у конкурентных self-hosted job раньше создавал гонки.
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Единственный список обязательных проверок живёт в package.json#scripts.verify.
      # Иначе CI и локальный прогон неизбежно расходятся. pipefail сохраняет
      # исходный код pnpm при одновременной записи полного корпуса в артефакт.
      - name: Verify repository, geometry, package and tests
        shell: bash
        run: |
          set -o pipefail
          pnpm verify 2>&1 | tee verify-linux.log

      - name: Upload failed Linux verify log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-verify-log
          path: verify-linux.log
          if-no-files-found: warn
          retention-days: 3

      # Bite tests доказывают, что критические гарды действительно падают,
      # а не только печатают зелёный отчёт на исправном корпусе.
      - name: Semantics guard bites on invalid class
        run: |
          cp semantics/assignments.json /tmp/_assignments_backup.json
          trap 'cp /tmp/_assignments_backup.json semantics/assignments.json' EXIT
          sed -i 's/"accessibility": {"class": "generic"}/"accessibility": {"class": "levitate"}/' semantics/assignments.json
          if pnpm check:semantics; then
            echo "ERROR: semantics should have failed"
            exit 1
          fi

      - name: Parity guard bites on extra icon
        run: |
          cp svg/Filled/accessibility_filled.svg svg/Filled/_EXTRA_TEST_filled.svg
          trap 'rm -f svg/Filled/_EXTRA_TEST_filled.svg' EXIT
          if pnpm check:parity; then
            echo "ERROR: parity should have failed"
            exit 1
          fi

      - name: Colour guard bites on hardcoded hex
        run: |
          echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#101012"><path d="M0 0"/></svg>' \
            > dist/svg/Filled/_colour_test.svg
          trap 'rm -f dist/svg/Filled/_colour_test.svg' EXIT
          if pnpm check:colors; then
            echo "ERROR: colours should have failed"
            exit 1
          fi

      - name: Layers guard bites on invalid path index
        run: |
          cp semantics/layers.json /tmp/_layers_backup.json
          trap 'cp /tmp/_layers_backup.json semantics/layers.json' EXIT
          node -e "const fs=require('fs');const p='semantics/layers.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.icons.history.outline.parts[0].paths=[99];fs.writeFileSync(p,JSON.stringify(j,null,1)+'\n');"
          if pnpm check:layers; then
            echo "ERROR: layers should have failed"
            exit 1
          fi

      - name: Motion bounds guard bites on oversized scale
        run: |
          cp src/animate/icon-choreographies.generated.json /tmp/_choreo_backup.json
          trap 'cp /tmp/_choreo_backup.json src/animate/icon-choreographies.generated.json' EXIT
          node -e "const fs=require('fs');const p='src/animate/icon-choreographies.generated.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.icons.heart.outline.parts[0].keyframes=[{offset:0,transform:'scale(1, 1)'},{offset:0.5,transform:'scale(1.4, 1.4)'},{offset:1,transform:'scale(1, 1)'}];fs.writeFileSync(p,JSON.stringify(j,null,1)+'\n');"
          if pnpm check:motion-bounds; then
            echo "ERROR: bounds should have failed"
            exit 1
          fi

      - name: Motion collision guard bites on wild clapper swing
        run: |
          cp src/animate/icon-choreographies.generated.json /tmp/_choreo_backup2.json
          trap 'cp /tmp/_choreo_backup2.json src/animate/icon-choreographies.generated.json' EXIT
          node -e "const fs=require('fs');const p='src/animate/icon-choreographies.generated.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.icons.notifications.outline.parts[1].keyframes=[{offset:0,transform:'rotate(0deg)'},{offset:0.5,transform:'rotate(-50deg)'},{offset:1,transform:'rotate(0deg)'}];fs.writeFileSync(p,JSON.stringify(j,null,1)+'\n');"
          if pnpm check:motion-collision; then
            echo "ERROR: collision should have failed"
            exit 1
          fi

  windows-verify:
    name: Canonical pnpm verify (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # Это не сокращённый smoke: Windows обязан пройти тот же полный контракт,
      # включая pack → offline install → ESM/CJS/types consumer.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.30.3
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository, geometry, package and tests
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          pnpm verify 2>&1 | Tee-Object -FilePath verify-windows.log
          $verifyExit = $LASTEXITCODE
          if ($verifyExit -ne 0) { exit $verifyExit }

      # GitHub UI режет длинный лог полного корпуса. Артефакт сохраняется только
      # при ошибке и позволяет разбирать точную первопричину, не перезапуская job.
      - name: Upload failed Windows verify log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-verify-log
          path: verify-windows.log
          if-no-files-found: warn
          retention-days: 3
