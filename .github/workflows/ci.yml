name: CI

on:
  push:
    branches: [master]
  # Stacked PR тоже обязан получить доказательство exact head SHA.
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '22.14.0'
          - os: ubuntu-latest
            node: '24'
          - os: ubuntu-latest
            node: '26'
          - os: windows-latest
            node: '24'
          - os: macos-latest
            node: '24'

    steps:
      # Все third-party actions закреплены commit SHA; tag используется только
      # как человекочитаемая биография обновления.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Observatory сравнивает generated с доказанным hand blob из history.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # Дословно совпадает с package.json#packageManager; repo-contract
          # запрещает второй источник версии.
          version: 11.13.1
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Один список обязательных проверок живёт в package.json#scripts.verify.
      - name: Verify repository, geometry, package and tests
        run: pnpm verify

      # Bite tests выполняются один раз на основной LTS: их задача — доказать
      # запрещающую ветку guard, а не повторить platform matrix.
      - name: Parity guard bites on extra icon
        if: matrix.os == 'ubuntu-latest' && matrix.node == '24'
        shell: bash
        run: |
          cp svg/Filled/accessibility_filled.svg svg/Filled/_EXTRA_TEST_filled.svg
          trap 'rm -f svg/Filled/_EXTRA_TEST_filled.svg' EXIT
          if pnpm check:parity; then
            echo "ERROR: parity should have failed"
            exit 1
          fi

      - name: Colour guard bites on hardcoded hex
        if: matrix.os == 'ubuntu-latest' && matrix.node == '24'
        shell: bash
        run: |
          echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#101012"><path d="M0 0"/></svg>' \
            > dist/svg/Filled/_colour_test.svg
          trap 'rm -f dist/svg/Filled/_colour_test.svg' EXIT
          if pnpm check:colors; then
            echo "ERROR: colours should have failed"
            exit 1
          fi
