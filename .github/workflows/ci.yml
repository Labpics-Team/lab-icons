name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-verify:
    name: Build, parity, colours, tree-shaking
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (svgo optimise + generate ESM index)
        run: pnpm build

      - name: Parity check (222 × 2 = 444 exports)
        run: pnpm check:parity

      - name: Colour check (no hardcoded hex in optimised SVGs)
        run: pnpm check:colors

      - name: Tree-shaking proof
        run: pnpm check:treeshake

      - name: Semantics check (атрибутика 222 имён)
        run: pnpm check:semantics

      - name: Variant parity check (контракт пары O↔F — каноны колец, регистрация)
        run: pnpm check:variant-parity

      - name: Anatomy check (декларации анатомии сходятся с файлами, generated ≥99.5%)
        run: pnpm check:anatomy

      - name: Path quality check (шум кривых, волосяные фрагменты, встык-швы)
        run: pnpm check:path-quality

      - name: Static grid check (поля, keylines)
        run: pnpm check:static-grid

      - name: Tests (анатомия, примитивы, гейты, геометрия — дифференциал по 444 SVG)
        run: pnpm test

      # Bite test: битый класс в семантике должен уронить гейт
      - name: Semantics guard bites on invalid class
        run: |
          cp semantics/assignments.json /tmp/_assignments_backup.json
          sed -i 's/"accessibility": {"class": "generic"}/"accessibility": {"class": "levitate"}/' semantics/assignments.json
          pnpm check:semantics && echo "ERROR: semantics should have failed" && exit 1 || echo "OK: semantics correctly failed on invalid class"
          cp /tmp/_assignments_backup.json semantics/assignments.json

      # Bite test: inject a missing SVG and assert parity fails
      - name: Parity guard bites on missing icon
        run: |
          cp svg/Filled/accessibility_filled.svg svg/Filled/_EXTRA_TEST_filled.svg
          pnpm check:parity && echo "ERROR: parity should have failed" && exit 1 || echo "OK: parity correctly failed on extra file"
          rm svg/Filled/_EXTRA_TEST_filled.svg

      # Bite test: inject hardcoded colour and assert colors fails
      - name: Colour guard bites on hardcoded hex
        run: |
          echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#101012"><path d="M0 0"/></svg>' \
            > dist/svg/Filled/_colour_test.svg
          pnpm check:colors && echo "ERROR: colours should have failed" && exit 1 || echo "OK: colour check correctly failed on injected hex"
          rm dist/svg/Filled/_colour_test.svg

      # Bite test: битый path-индекс в per-icon разметке должен уронить гейт
      - name: Layers guard bites on invalid path index
        run: |
          cp semantics/layers.json /tmp/_layers_backup.json
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('semantics/layers.json','utf8'));j.icons['history'].outline.parts[0].paths=[99];fs.writeFileSync('semantics/layers.json',JSON.stringify(j,null,1));"
          pnpm check:layers && echo "ERROR: layers should have failed" && exit 1 || echo "OK: layers correctly failed on invalid path index"
          cp /tmp/_layers_backup.json semantics/layers.json

      # Bite test: раздутый масштаб должен уронить bounds-гейт (вылет за канву)
      - name: Motion bounds guard bites on oversized scale
        run: |
          cp src/animate/icon-choreographies.generated.json /tmp/_choreo_backup.json
          node -e "const fs=require('fs');const p='src/animate/icon-choreographies.generated.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.icons['heart'].outline.parts[0].keyframes=[{offset:0,transform:'scale(1, 1)'},{offset:0.5,transform:'scale(1.4, 1.4)'},{offset:1,transform:'scale(1, 1)'}];fs.writeFileSync(p,JSON.stringify(j,null,1));"
          pnpm check:motion-bounds && echo "ERROR: bounds should have failed" && exit 1 || echo "OK: bounds correctly failed on oversized scale"
          cp /tmp/_choreo_backup.json src/animate/icon-choreographies.generated.json

      # Bite test: размашистый язычок должен уронить collision-гейт (наслоение)
      - name: Motion collision guard bites on wild clapper swing
        run: |
          cp src/animate/icon-choreographies.generated.json /tmp/_choreo_backup2.json
          node -e "const fs=require('fs');const p='src/animate/icon-choreographies.generated.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.icons['notifications'].outline.parts[1].keyframes=[{offset:0,transform:'rotate(0deg)'},{offset:0.5,transform:'rotate(-50deg)'},{offset:1,transform:'rotate(0deg)'}];fs.writeFileSync(p,JSON.stringify(j,null,1));"
          pnpm check:motion-collision && echo "ERROR: collision should have failed" && exit 1 || echo "OK: collision correctly failed on wild clapper"
          cp /tmp/_choreo_backup2.json src/animate/icon-choreographies.generated.json
